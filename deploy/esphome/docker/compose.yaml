services:
  esphome:
    container_name: infohub-esphome
    image: ${ESPHOME_IMAGE:-ghcr.io/esphome/esphome:2026.4}
    restart: unless-stopped
    working_dir: /config
    command:
      - dashboard
      - /config
      - --address
      - 0.0.0.0
      - --port
      - "6052"
    ports:
      - "${ESPHOME_PORT:-6052}:6052"
    environment:
      ESPHOME_DASHBOARD_USE_PING: "true"
      ESPHOME_LOG_LEVEL: ${ESPHOME_LOG_LEVEL:-INFO}
      USERNAME: ${ESPHOME_USERNAME:-}
      PASSWORD: ${ESPHOME_PASSWORD:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,10.30.5.0/24}
    volumes:
      - ../:/config
      - esphome_cache:/cache
      - esphome_build:/build
    stdin_open: true
    tty: true

volumes:
  esphome_cache:
  esphome_build:
