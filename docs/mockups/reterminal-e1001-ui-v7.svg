  <text class="value" x="288" y="145">33.6M</text>
  <line class="divider" x1="288" y1="157" x2="512" y2="157"/>
  <text class="muted" x="288" y="173">$13.66</text>

  <rect class="panel" x="534" y="58" width="248" height="130"/>
