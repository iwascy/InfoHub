  <text class="value" x="546" y="145">36.5M</text>
  <line class="divider" x1="546" y1="157" x2="770" y2="157"/>
  <text class="muted" x="546" y="173">$13.66</text>

  <rect class="panel" x="18" y="193" width="506" height="135"/>
  <text class="label" x="30" y="214">Claude 配额</text>
  <text class="muted" x="30" y="236">5H 重置: --</text>
  <text class="quota" x="30" y="266">5H</text>
  <text class="quota" x="227" y="266" text-anchor="end">--</text>
  <rect class="track" x="30" y="284" width="190" height="9" rx="4.5"/>
  <rect class="bar" x="31" y="285" width="0" height="7" rx="3.5"/>
  <line class="divider" x1="245" y1="257" x2="245" y2="300"/>
  <text class="quota" x="270" y="266">Week</text>
  <text class="quota" x="496" y="266" text-anchor="end">--</text>
  <rect class="track" x="270" y="284" width="230" height="9" rx="4.5"/>
  <rect class="bar" x="271" y="285" width="0" height="7" rx="3.5"/>

  <rect class="panel" x="18" y="333" width="506" height="138"/>
  <text class="label" x="30" y="354">Codex 配额</text>
  <text class="muted" x="30" y="376">5H 重置: 2026-04-23 15:07</text>
  <text class="quota" x="30" y="404">5H</text>
  <text class="quota" x="227" y="404" text-anchor="end">5%</text>
  <rect class="track" x="30" y="424" width="190" height="9" rx="4.5"/>
  <rect class="bar" x="31" y="425" width="9.4" height="7" rx="3.5"/>
  <line class="divider" x1="245" y1="397" x2="245" y2="440"/>
  <text class="quota" x="270" y="404">Week</text>
  <text class="quota" x="496" y="404" text-anchor="end">37%</text>
  <rect class="track" x="270" y="424" width="230" height="9" rx="4.5"/>
  <rect class="bar" x="271" y="425" width="84.4" height="7" rx="3.5"/>

  <rect class="panel" x="534" y="193" width="248" height="278"/>
  <text class="label" x="550" y="214">告警</text>
  <text class="alert" x="550" y="250">Codex admin10010</text>
  <text class="alert" x="550" y="273">5H 余量仅 5%</text>
  <line class="divider" x1="550" y1="406" x2="766" y2="406"/>
  <circle cx="559" cy="426" r="5" fill="none" stroke="#555" stroke-width="0.5"/>
  <text class="muted" x="574" y="430">刷新周期 600s</text>
</svg>
