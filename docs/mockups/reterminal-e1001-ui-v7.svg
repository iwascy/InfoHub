<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <style>
      .bg { fill: #f0ede6; }
      .panel { fill: #f5f3ec; stroke: #222; stroke-width: 1.5; }
      .divider { stroke: #222; stroke-width: 0.75; opacity: 0.5; }
      .title { font: 700 24px "Noto Sans SC", "PingFang SC", sans-serif; fill: #111; }
      .time { font: 600 16px "Noto Sans SC", "PingFang SC", sans-serif; fill: #444; }
      .label { font: 700 17px "Noto Sans SC", "PingFang SC", sans-serif; fill: #111; }
      .value { font: 700 54px "Noto Sans SC", "PingFang SC", sans-serif; fill: #111; letter-spacing: -1px; }
      .muted { font: 700 14px "Noto Sans SC", "PingFang SC", sans-serif; fill: #555; }
      .quota { font: 700 18px "Noto Sans SC", "PingFang SC", sans-serif; fill: #111; }
      .alert { font: 700 15px "Noto Sans SC", "PingFang SC", sans-serif; fill: #111; }
      .badge-fill { fill: #111; }
      .badge-text { font: 700 13px "Noto Sans SC", "PingFang SC", sans-serif; fill: #f5f3ec; }
      .track { fill: none; stroke: #bbb; stroke-width: 1; }
      .bar { fill: #333; }
    </style>
  </defs>

  <rect class="bg" width="800" height="480"/>
  <rect class="panel" x="9" y="9" width="782" height="462" rx="5"/>

  <rect class="panel" x="18" y="17" width="764" height="36" rx="4"/>
