  <rect class="badge-fill" x="692" y="21" width="82" height="24" rx="12"/>
  <text class="badge-text" x="733" y="38" text-anchor="middle">状态 正常</text>

  <rect class="panel" x="18" y="58" width="248" height="130"/>
