  <text class="value" x="30" y="145">2.9M</text>
  <line class="divider" x1="30" y1="157" x2="254" y2="157"/>
  <text class="muted" x="30" y="173">$0.00</text>

  <rect class="panel" x="276" y="58" width="248" height="130"/>
